<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Workout Plan Generator</title><script src="https://cdn.tailwindcss.com"></script></head><body class="bg-slate-900 text-white flex flex-col items-center justify-center min-h-screen p-4"><div class="bg-gray-800 p-8 rounded-lg shadow-xl w-full max-w-md"><h1 class="text-3xl font-bold text-center mb-6">Your Custom Workout Plan</h1><p class="text-center mb-4">Answer a few questions to get your personalized workout!</p><form id="workoutForm" class="space-y-4"><label class="block"><span class="text-gray-300">Target Muscle Group:</span><select id="muscleGroup" class="mt-1 block w-full rounded-md bg-gray-700 border-transparent focus:border-gray-500 focus:bg-gray-600 focus:ring-0"><option value="fullbody">Full Body</option><option value="upperbody">Upper Body</option><option value="lowerbody">Lower Body</option></select></label><label class="block"><span class="text-gray-300">Available Equipment:</span><select id="equipment" class="mt-1 block w-full rounded-md bg-gray-700 border-transparent focus:border-gray-500 focus:bg-gray-600 focus:ring-0"><option value="bodyweight">Bodyweight</option><option value="dumbbells">Dumbbells</option></select></label><label class="block"><span class="text-gray-300">Fitness Goal:</span><select id="goal" class="mt-1 block w-full rounded-md bg-gray-700 border-transparent focus:border-gray-500 focus:bg-gray-600 focus:ring-0"><option value="strength">Strength</option><option value="endurance">Endurance</option></select></label><button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-md mt-6">Generate Plan ($9.99)</button></form><div id="planOutput" class="hidden mt-8 p-4 bg-gray-700 rounded-md"><h2 class="text-2xl font-bold mb-4">Your Workout:</h2><ul id="workoutList" class="list-disc list-inside space-y-2"></ul><button onclick="window.print()" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-4 rounded-md mt-6">Print/Download PDF</button></div></div><script>document.getElementById('workoutForm').addEventListener('submit', function(e) { e.preventDefault(); /* Simulate Stripe Payment */ alert('Simulated payment of $9.99 processed! Generating plan...'); /* Actual plan generation (simple hardcoded logic) */ let muscleGroup = document.getElementById('muscleGroup').value; let equipment = document.getElementById('equipment').value; let plan = []; if (muscleGroup === 'fullbody') { if (equipment === 'bodyweight') { plan = ['Push-ups', 'Squats', 'Lunges', 'Plank', 'Burpees']; } else if (equipment === 'dumbbells') { plan = ['Dumbbell Rows', 'Goblet Squats', 'Overhead Press', 'Deadlifts', 'Bicep Curls']; } } else if (muscleGroup === 'upperbody') { if (equipment === 'bodyweight') { plan = ['Push-ups', 'Dips', 'Pike Push-ups', 'Inverted Rows', 'Plank']; } else if (equipment === 'dumbbells') { plan = ['Dumbbell Press', 'Dumbbell Rows', 'Lateral Raises', 'Bicep Curls', 'Tricep Extensions']; } } else if (muscleGroup === 'lowerbody') { if (equipment === 'bodyweight') { plan = ['Squats', 'Lunges', 'Glute Bridges', 'Calf Raises', 'Wall Sit']; } else if (equipment === 'dumbbells') { plan = ['Goblet Squats', 'Dumbbell Lunges', 'Romanian Deadlifts', 'Calf Raises', 'Step-ups']; } } let workoutList = document.getElementById('workoutList'); workoutList.innerHTML = ''; plan.forEach(exercise => { let li = document.createElement('li'); li.textContent = `${exercise} (3 sets of 8-12 reps)`; workoutList.appendChild(li); }); document.getElementById('planOutput').classList.remove('hidden');});</script></body></html>
